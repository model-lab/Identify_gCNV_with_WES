name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-dryrun:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Miniconda
        uses: conda-incubator/setup-miniconda@v2
        with:
          auto-update-conda: true
          python-version: '3.10'
      - name: Create conda env
        run: |
          conda env create -f environment.yml -n cnv_test || conda env update -f environment.yml -n cnv_test
          conda activate cnv_test
          python -V
      - name: Install snakemake
        run: |
          conda activate cnv_test
          conda install -y -c bioconda snakemake
      - name: Run plan agent (smoke test)
        run: |
          conda activate cnv_test
          python scripts/plan_agent.py --sample EXAMPLE --bam data/bam/EXAMPLE.recal.bam --out plans/EXAMPLE.plan.yaml
      - name: Snakemake dry-run
        run: |
          conda activate cnv_test
          cd snakemake
          snakemake -n -p
