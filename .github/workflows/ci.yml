name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-dryrun:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Miniconda
        uses: conda-incubator/setup-miniconda@v2
        with:
          auto-update-conda: true
          python-version: '3.10'
      - name: Create conda env
        run: |
          conda env create -f environment.yml -n cnv_test || conda env update -f environment.yml -n cnv_test
          conda activate cnv_test
          python -V
      - name: Install snakemake
        run: |
          conda activate cnv_test
          conda install -y -c bioconda snakemake
      - name: Run smoke workflow
        run: |
          conda activate cnv_test
          # run minimal smoke workflow to validate end-to-end DAG
          snakemake -s workflow/smoke/Snakefile -j1
      - name: Agents smoke checks (plan dry-run, QC, package)
        run: |
          conda activate cnv_test
          set -e
          # Plan already produced by smoke Snakefile at plans/EXAMPLE.plan.yaml
          echo "--- Agents smoke: run_agent (dry-run)"
          python scripts/agents/run_agent.py --plan plans/EXAMPLE.plan.yaml --cores 1
          echo "--- Agents smoke: qc_agent"
          python scripts/agents/qc_agent.py --plan plans/EXAMPLE.plan.yaml --out qc/EXAMPLE.qc.yaml || true
          echo "--- Agents smoke: publish_agent (package)"
          python scripts/agents/publish_agent.py --plan plans/EXAMPLE.plan.yaml --out-dir publish/EXAMPLE --package || true
